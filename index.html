<!DOCTYPE html>

<head>
  <style>
    /* ============================================
   ROOT & RESET
   ============================================ */
:root {
    --color-primary: #c44b6b;
    --color-primary-dark: #a13554;
    --color-primary-light: #fdf2f8;
    --color-text: #1a1225;
    --color-text-secondary: #64748b;
    --color-text-light: #94a3b8;
    --color-bg: #f8fafc;
    --color-white: #ffffff;
    --color-border: #e2e8f0;
    --color-shadow: rgba(0,0,0,0.04);
    --color-shadow-hover: rgba(0,0,0,0.08);
    --radius: 24px;
    --radius-sm: 16px;
    --radius-full: 999px;
    --transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
*:focus {
    outline: none !important;
}

html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    font-family: var(--font);
    background: var(--color-bg);
    color: var(--color-text);
    padding: 24px 20px;
    min-height: 100vh;
    line-height: 1.6;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
}

/* ============================================
   HEADER
   ============================================ */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 16px;
}
.header__logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.header__logo-icon {
    font-size: 20px;
    -webkit-text-fill-color: var(--color-primary);
    opacity: 0.8;
}
.header__logo-text span {
    font-weight: 300;
    -webkit-text-fill-color: var(--color-text-secondary);
}
.header__right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

/* ============================================
   LANGUAGE DROPDOWN
   ============================================ */
.lang-dropdown {
    position: relative;
    display: inline-block;
}
.lang-dropdown__btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--color-white);
    border: none;
    border-radius: var(--radius-full);
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: var(--transition);
    color: var(--color-text);
    box-shadow: 0 2px 8px var(--color-shadow);
}
.lang-dropdown__btn:hover {
    background: var(--color-primary);
    color: var(--color-white);
    transform: scale(1.04) translateY(-2px);
    box-shadow: 0 8px 25px rgba(196,75,107,0.25);
}
.lang-dropdown__arrow {
    transition: transform 0.3s;
}
.lang-dropdown__arrow.open {
    transform: rotate(180deg);
}
.lang-dropdown__menu {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    background: var(--color-white);
    border-radius: var(--radius-sm);
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    overflow: hidden;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-8px) scale(0.96);
    transition: var(--transition);
    z-index: 100;
    min-width: 140px;
}
.lang-dropdown__menu.active {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
}
.lang-dropdown__item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 500;
    font-family: var(--font);
    color: var(--color-text);
    cursor: pointer;
    transition: 0.2s;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
}
.lang-dropdown__item:hover {
    background: var(--color-primary-light);
    color: var(--color-primary);
}
.lang-dropdown__item.active {
    background: var(--color-primary-light);
    color: var(--color-primary);
    font-weight: 700;
}
.lang-dropdown__item .flag {
    font-size: 18px;
}

/* ============================================
   NAVIGATION
   ============================================ */
.nav {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 32px;
}
.nav__link {
    background: var(--color-white);
    border: none;
    padding: 10px 22px;
    border-radius: var(--radius-full);
    font-weight: 600;
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    transition: var(--transition);
    color: var(--color-text);
    box-shadow: 0 2px 8px var(--color-shadow);
}
.nav__link:hover {
    background: var(--color-primary);
    color: var(--color-white);
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 25px rgba(196,75,107,0.3);
}
.nav__link.active {
    background: var(--color-primary);
    color: var(--color-white);
    box-shadow: 0 8px 25px rgba(196,75,107,0.3);
}

/* ============================================
   CATALOG
   ============================================ */
.catalog {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 28px;
}
.catalog.hidden {
    display: none;
}

.catalog__item {
    background: var(--color-white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 8px 25px var(--color-shadow);
    transition: var(--transition);
    cursor: pointer;
    animation: fadeUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.catalog__item:nth-child(1) { animation-delay: 0.05s; }
.catalog__item:nth-child(2) { animation-delay: 0.12s; }
.catalog__item:nth-child(3) { animation-delay: 0.19s; }
.catalog__item:nth-child(4) { animation-delay: 0.26s; }
.catalog__item:nth-child(5) { animation-delay: 0.33s; }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.catalog__item:hover {
    transform: translateY(-10px) scale(1.01);
    box-shadow: 0 20px 50px var(--color-shadow-hover);
}

.catalog__img {
    height: 200px;
    background: var(--color-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    position: relative;
    overflow: hidden;
}
.catalog__img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.catalog__item:hover .catalog__img img {
    transform: scale(1.08);
}

.catalog__badge {
    position: absolute;
    top: 14px;
    right: 14px;
    background: var(--color-primary);
    color: var(--color-white);
    font-size: 10px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    animation: pulseBadge 2s ease-in-out infinite;
    box-shadow: 0 4px 15px rgba(196,75,107,0.4);
}
@keyframes pulseBadge {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); box-shadow: 0 4px 25px rgba(196,75,107,0.6); }
}

.catalog__info {
    padding: 18px 20px 22px;
}
.catalog__title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
    transition: color 0.3s;
    color: var(--color-text);
}
.catalog__item:hover .catalog__title {
    color: var(--color-primary);
}
.catalog__desc {
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.5;
    margin-bottom: 14px;
    font-weight: 400;
}
.catalog__footer {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.catalog__price {
    font-weight: 700;
    font-size: 16px;
    color: var(--color-text);
}
.catalog__price small {
    font-weight: 400;
    font-size: 11px;
    color: var(--color-text-light);
    text-decoration: line-through;
    margin-left: 6px;
}
.catalog__btn {
    background: var(--color-text);
    color: var(--color-white);
    border: none;
    padding: 10px 24px;
    border-radius: var(--radius-full);
    font-weight: 700;
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    transition: var(--transition);
    box-shadow: 0 4px 16px rgba(26,18,37,0.15);
}
.catalog__btn:hover {
    background: var(--color-primary);
    transform: scale(1.05) translateY(-2px);
    box-shadow: 0 8px 30px rgba(196,75,107,0.4);
}

/* ============================================
   SECTIONS (Contact / Messages)
   ============================================ */
.section {
    display: none;
    text-align: center;
    padding: 40px 20px;
    background: var(--color-white);
    border-radius: var(--radius);
    box-shadow: 0 8px 25px var(--color-shadow);
}
.section.active {
    display: block;
    animation: fadeIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.section__title {
    font-size: 28px;
    font-weight: 800;
    color: var(--color-text);
    margin-bottom: 8px;
}
.section__desc {
    color: var(--color-text-secondary);
    font-size: 16px;
    margin-bottom: 24px;
}

/* Social */
.social {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
    max-width: 360px;
    margin: 0 auto;
}
.social__link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: 100%;
    padding: 14px 24px;
    border-radius: var(--radius-full);
    font-weight: 600;
    font-size: 17px;
    font-family: var(--font);
    text-decoration: none;
    color: var(--color-white);
    transition: var(--transition);
    border: none;
}
.social__link:hover {
    transform: scale(1.04) translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}
.social__link svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
    flex-shrink: 0;
}
.social__link--telegram { background: #0088cc; }
.social__link--instagram { background: #e1306c; }
.social__link--whatsapp { background: #25d366; }

/* Messages */
.messages {
    max-width: 600px;
    margin: 0 auto;
    text-align: left;
}
.messages__input {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.messages__input input {
    flex: 1;
    padding: 12px 18px;
    border-radius: var(--radius-full);
    background: var(--color-border);
    color: var(--color-text);
    font-size: 14px;
    font-family: var(--font);
    border: none;
    min-width: 150px;
    transition: box-shadow 0.3s;
}
.messages__input input:focus {
    box-shadow: 0 0 0 2px var(--color-primary);
}
.messages__input button {
    padding: 12px 28px;
    background: var(--color-primary);
    color: var(--color-white);
    border: none;
    border-radius: var(--radius-full);
    font-weight: 700;
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    transition: var(--transition);
}
.messages__input button:hover {
    background: var(--color-primary-dark);
    transform: scale(1.03);
}

.messages__list {
    max-height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 6px;
}
.messages__list::-webkit-scrollbar { width: 4px; }
.messages__list::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 10px; }

.messages__item {
    background: var(--color-border);
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--color-text);
    word-break: break-word;
    animation: fadeIn 0.3s ease;
}
.messages__item .msg-name {
    font-weight: 700;
    color: var(--color-primary);
    margin-right: 8px;
}
.messages__item .msg-time {
    font-size: 11px;
    color: var(--color-text-light);
    margin-left: 10px;
}

/* ============================================
   MODALS
   ============================================ */
.modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.modal.active {
    display: flex;
}

/* Image Modal */
.modal--image {
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
}
.modal__content--image {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    background: transparent;
    border-radius: var(--radius-sm);
    overflow: hidden;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes zoomIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
}
.modal__content--image img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    display: block;
}

/* Order Modal */
.modal--order {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
}
.modal__content--order {
    background: var(--color-white);
    max-width: 420px;
    width: 100%;
    border-radius: var(--radius);
    padding: 40px 32px 32px;
    text-align: center;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    position: relative;
}
.modal__close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: var(--color-text-light);
    transition: var(--transition);
}
.modal__close:hover {
    color: var(--color-text);
    transform: rotate(90deg) scale(1.1);
}
.modal__title {
    font-size: 24px;
    font-weight: 800;
    color: var(--color-text);
    margin-bottom: 6px;
}
.modal__desc {
    color: var(--color-text-secondary);
    font-size: 14px;
    margin-bottom: 20px;
}
.modal__content--order input {
    width: 100%;
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    background: var(--color-border);
    color: var(--color-text);
    font-size: 15px;
    font-family: var(--font);
    border: none;
    margin-bottom: 14px;
    transition: box-shadow 0.3s;
}
.modal__content--order input:focus {
    box-shadow: 0 0 0 2px var(--color-primary);
}
.modal__content--order input[readonly] {
    background: var(--color-bg);
    color: var(--color-text-secondary);
}
.modal__btn {
    width: 100%;
    padding: 14px;
    background: var(--color-primary);
    color: var(--color-white);
    border: none;
    border-radius: var(--radius-full);
    font-weight: 700;
    font-size: 16px;
    font-family: var(--font);
    cursor: pointer;
    transition: var(--transition);
}
.modal__btn:hover {
    background: var(--color-primary-dark);
    transform: scale(1.02);
}
.modal__btn--secondary {
    margin-top: 12px;
    background: var(--color-border);
    color: var(--color-text);
}
.modal__btn--secondary:hover {
    background: #d1d5db;
}
.modal__status {
    margin-top: 14px;
    font-size: 14px;
    color: var(--color-text-secondary);
}

/* ============================================
   TOAST
   ============================================ */
#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--color-text);
    color: var(--color-white);
    padding: 14px 32px;
    border-radius: var(--radius-full);
    font-weight: 600;
    font-size: 14px;
    font-family: var(--font);
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    white-space: nowrap;
}
#toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
    body { padding: 16px 12px; }
    .header { flex-direction: column; align-items: start; gap: 12px; }
    .header__logo { font-size: 22px; }
    .catalog { grid-template-columns: 1fr 1fr; gap: 14px; }
    .catalog__img { height: 140px; }
    .catalog__info { padding: 12px 14px 16px; }
    .catalog__title { font-size: 14px; }
    .catalog__btn { font-size: 12px; padding: 8px 16px; }
    .nav { width: 100%; justify-content: center; gap: 8px; }
    .nav__link { flex: 1; text-align: center; min-width: 80px; padding: 8px 12px; font-size: 13px; }
    .header__right { width: 100%; justify-content: flex-start; }
    .lang-dropdown__btn { min-width: 80px; font-size: 12px; padding: 6px 12px; }
    .modal__content--order { padding: 30px 20px; }
    .modal__content--image img { max-width: 95vw; max-height: 70vh; }
    .messages__input input { min-width: 120px; font-size: 13px; }
    .messages__input button { font-size: 13px; padding: 10px 20px; }
    #toast { font-size: 13px; padding: 12px 24px; white-space: normal; max-width: 90%; }
}

@media (max-width: 480px) {
    .catalog { grid-template-columns: 1fr; max-width: 320px; margin: 0 auto; }
    .catalog__img { height: 200px; }
}

function setLanguage(lang) {

    $('orderInstagram').placeholder = t.placeholders.instagram;
    $('orderTelegram').placeholder = t.placeholders.telegram;

    $('orderModalCloseBtn').textContent = t.closeBtn;
    msgNameInput.placeholder = t.placeholders.name;
    msgTextInput.placeholder = t.placeholders.msg;

/* ============================================
   RENDER CATALOG
   ============================================ */
function renderCatalog() {
    const t = translations[currentLang];
    grid.innerHTML = products.map(p => `
        <div class="catalog__item" data-id="${p.id}" data-image="${p.image}">
            <div class="catalog__img">
                <img src="${p.image}" alt="${p.name}" loading="lazy" />
                ${p.badge ? `<span class="catalog__badge">${p.badge}</span>` : ''}
            </div>
            <div class="catalog__info">
                <div class="catalog__title">${p.name}</div>
                <div class="catalog__desc">${p.desc}</div>
                <div class="catalog__footer">
                    <div class="catalog__price">$${p.price.toFixed(2)} ${p.oldPrice ? `<small>$${p.oldPrice.toFixed(2)}</small>` : ''}</div>
                    <button class="catalog__btn" data-id="${p.id}">${t.buyBtn}</button>
                </div>
            </div>
        </div>
    `).join('');

    // Click on card → image modal
    document.querySelectorAll('.catalog__item').forEach(card => {
        card.addEventListener('click', function(e) {
            if (e.target.closest('.catalog__btn')) return;
            const src = this.dataset.image;
            if (src) openImageModal(src);
        });
    });

    // Click on buy button → order modal
    document.querySelectorAll('.catalog__btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const product = products.find(p => p.id === id);
            if (product) openOrderModal(product);
        });
    });
}

/* ============================================
   IMAGE MODAL
   ============================================ */
function openImageModal(src) {
    const modal = $('imageModal');
    $('imageModalImg').src = src;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeImageModal() {
    $('imageModal').classList.remove('active');
    document.body.style.overflow = '';
}
$('imageModalClose').addEventListener('click', closeImageModal);
$('imageModal').addEventListener('click', function(e) {
    if (e.target === this) closeImageModal();
});

/* ============================================
   ORDER MODAL
   ============================================ */
function openOrderModal(product) {
    const modal = $('orderModal');
    $('orderProduct').value = product.name;
    $('orderPhone').value = '';
    $('orderInstagram').value = '';
    $('orderTelegram').value = '';
    $('orderStatus').textContent = '';
    modal.dataset.productId = product.id;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeOrderModal() {
    $('orderModal').classList.remove('active');
    document.body.style.overflow = '';
}
$('orderModalClose').addEventListener('click', closeOrderModal);

    if (e.target === this) closeOrderModal();
});

/* ============================================
   SUBMIT ORDER → TELEGRAM
   ============================================ */
$('orderSubmitBtn').addEventListener('click', function() {
    const productName = $('orderProduct').value;
    const phone = $('orderPhone').value.trim();
    const instagram = $('orderInstagram').value.trim();
    const telegram = $('orderTelegram').value.trim();
    const status = $('orderStatus');

    if (!phone) {
        status.textContent = '⚠️ Iltimos, telefon raqamni kiriting!';
        status.style.color = '#dc2626';
        return;
    }

    status.textContent = '⏳ Yuborilmoqda...';
    status.style.color = '#64748b';
    this.disabled = true;

    sendToTelegram(productName, phone, instagram, telegram)
        .then(() => {
            status.textContent = '✅ Buyurtma muvaffaqiyatli yuborildi!';
            status.style.color = '#16a34a';
            showToast(translations[currentLang].toastOrder);
            setTimeout(closeOrderModal, 1500);
        })
        .catch(err => {
            status.textContent = '❌ Xatolik: ' + err.message;
            status.style.color = '#dc2626';
        })
        .finally(() => { this.disabled = false; });
});

/* ============================================
   TELEGRAM API
   ============================================ */
function sendToTelegram(productName, phone, instagram, telegram) {
    const BOT_TOKEN = '8912156855:AAHY4PH_KvCugEXXhUUNQb-LH0xPNEXgjoM';
    const CHAT_ID = '7693382845';
    
    let message = `🛒 YANGI BUYURTMA!\n\n`;
    message += `📦 Mahsulot: ${productName}\n`;
    message += `📞 Telefon: ${phone || '❌ Kiritilmagan'}\n`;
    message += `📸 Instagram: ${instagram || '❌ Kiritilmagan'}\n`;
    message += `✈️ Telegram: ${telegram || '❌ Kiritilmagan'}\n`;
    message += `⏰ Vaqt: ${new Date().toLocaleString()}`;

    return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: message })
    })
    .then(res => {
        if (!res.ok) return res.json().then(err => { throw new Error(err.description || 'Xatolik'); });
        return res.json();
    });
}

/* ============================================
   NAVIGATION
   ============================================ */
function switchToServices() {
    grid.classList.remove('hidden');
    contactSection.classList.remove('active');
    messagesSection.classList.remove('active');
    navLinks.forEach(b => b.classList.remove('active'));
    document.querySelector('.nav__link[data-section="services"]').classList.add('active');
}

function switchToContact() {
    grid.classList.add('hidden');
    contactSection.classList.add('active');
    messagesSection.classList.remove('active');
    navLinks.forEach(b => b.classList.remove('active'));
    document.querySelector('.nav__link[data-section="contact"]').classList.add('active');
}

function switchToMessages() {
    grid.classList.add('hidden');
    contactSection.classList.remove('active');
    messagesSection.classList.add('active');
    navLinks.forEach(b => b.classList.remove('active'));
    document.querySelector('.nav__link[data-section="messages"]').classList.add('active');
    renderMessages();
}

navLinks.forEach(btn => {
    btn.addEventListener('click', function() {
        const section = this.dataset.section;
        if (section === 'services') switchToServices();
        else if (section === 'contact') switchToContact();
        else if (section === 'messages') switchToMessages();
    });
});

/* ============================================
   MESSAGES
   ============================================ */
function renderMessages() {
    messagesList.innerHTML = messages.map(msg => `
        <div class="messages__item">
            <span class="msg-name">${escapeHtml(msg.name)}</span>
            ${escapeHtml(msg.text)}
            <span class="msg-time">${msg.time}</span>
        </div>
    `).join('');
    messagesList.scrollTop = messagesList.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

sendMsgBtn.addEventListener('click', function() {
    const name = msgNameInput.value.trim();
    const text = msgTextInput.value.trim();
    if (!name || !text) {
        showToast('Iltimos, ism va xabarni kiriting.', 'error');
        return;
    }
    const newMsg = { name, text, time: new Date().toLocaleString() };
    messages.push(newMsg);
    localStorage.setItem('joraboyev_messages', JSON.stringify(messages));
    renderMessages();
    msgNameInput.value = '';
    msgTextInput.value = '';
    showToast('Xabar yuborildi!');
});

/* ============================================
   TOAST
   ============================================ */
function showToast(msg, type = 'success') {
    toast.textContent = msg;
    toast.className = 'show';
    toast.style.background = type === 'error' ? '#dc2626' : '#1a1225';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
}

/* ============================================
   LANGUAGE DROPDOWN
   ============================================ */
const langBtn = $('langBtn');
const langMenu = $('langMenu');
const langArrow = $('langArrow');
const langItems = document.querySelectorAll('.lang-dropdown__item');

langBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    langMenu.classList.toggle('active');
    langArrow.classList.toggle('open');
});

document.addEventListener('click', () => {
    langMenu.classList.remove('active');
    langArrow.classList.remove('open');
});

langItems.forEach(item => {
    item.addEventListener('click', function() {
        const lang = this.dataset.lang;
        setLanguage(lang);
        langMenu.classList.remove('active');
        langArrow.classList.remove('open');
        langItems.forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        $('currentLangText').innerHTML = this.innerHTML;
        renderCatalog();
    });
});

/* ============================================
   INIT
   ============================================ */
setLanguage('uz');
renderCatalog();
renderMessages();
