    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: none !important;
            outline: none !important;
        }
        *:focus {
            outline: none !important;
            box-shadow: none !important;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1a1225;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: none !important;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #c44b6b, #a13554);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            font-weight: 300;
            -webkit-text-fill-color: #7a5a67;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .lang-dropdown {
            position: relative;
            display: inline-block;
        }
        .lang-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: none !important;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #2d1f24;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            min-width: 120px;
            justify-content: center;
        }
        .lang-btn:hover {
            background: #fdf6f8;
            transform: scale(1.02);
        }
        .lang-btn .arrow {
            font-size: 10px;
            transition: 0.3s;
            margin-left: 4px;
        }
        .lang-btn .arrow.open {
            transform: rotate(180deg);
        }
        .lang-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            min-width: 140px;
            border: none !important;
        }
        .lang-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
        .lang-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 500;
            color: #1a1225;
            cursor: pointer;
            transition: 0.2s;
            border: none !important;
            background: none;
            width: 100%;
            text-align: left;
        }
        .lang-menu-item:hover {
            background: #fdf6f8;
            color: #c44b6b;
        }
        .lang-menu-item.active-lang {
            background: #fdf0f5;
            color: #c44b6b;
            font-weight: 700;
        }
        .lang-menu-item .flag {
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }
        .nav-link {
            background: #fff;
            border: none !important;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            color: #2d1f24;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .nav-link:hover {
            background: #fdf6f8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196,75,107,0.15);
        }
        .nav-link.active {
            background: #c44b6b;
            color: #fff;
            box-shadow: 0 6px 20px rgba(196,75,107,0.3);
        }
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 28px;
        }
        .catalog-grid.hidden {
            display: none;
        }
        .card-item {
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: none !important;
            animation: cardFadeIn 0.8s ease both;
        }
        .card-item:nth-child(1) { animation-delay: 0.05s; }
        .card-item:nth-child(2) { animation-delay: 0.12s; }
        .card-item:nth-child(3) { animation-delay: 0.19s; }
        .card-item:nth-child(4) { animation-delay: 0.26s; }
        .card-item:nth-child(5) { animation-delay: 0.33s; }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-item:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }
        .card-img {
            height: 200px;
            background: #f0e8e3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
            transition: 0.3s;
            overflow: hidden;
            cursor: pointer;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }
        .card-item:hover .card-img img {
            transform: scale(1.05);
        }
        .card-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: #c44b6b;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: badgePulse 2s ease-in-out infinite;
            box-shadow: 0 4px 15px rgba(196,75,107,0.4);
            pointer-events: none;
        }
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 4px 25px rgba(196,75,107,0.6); }
        }
        .card-info {
            padding: 18px 20px 22px;
        }
        .card-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
            transition: 0.3s;
        }
        .card-item:hover .card-title {
            color: #c44b6b;
        }
        .card-desc {
            font-size: 13px;
            color: #7a5a67;
            line-height: 1.5;
            margin-bottom: 14px;
            font-weight: 400;
        }
        .card-footer {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .price {
            font-weight: 700;
            font-size: 16px;
            color: #2d1f24;
        }
        .price small {
            font-weight: 400;
            font-size: 11px;
            color: #a18490;
            text-decoration: line-through;
            margin-left: 6px;
        }
        .buy-btn {
            background: #2d1f24;
            color: #fff;
            border: none !important;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
            margin-left: 0;
            box-shadow: 0 4px 16px rgba(45,31,36,0.15);
        }
        .buy-btn:hover {
            background: #c44b6b;
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(196,75,107,0.4);
        }
        #toast {

            bottom: 30px;

            z-index: 99;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);

        }
        #toast.show {
            opacity: 1;

        }

            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 30px;
            cursor: pointer;
        }
        .img-preview-overlay.active {
            display: flex;
        }
        .img-preview-overlay img {

            max-height: 95%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: zoomIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

            from { opacity: 0; transform: scale(0.85); }

            top: 30px;
            right: 40px;
            font-size: 42px;
            color: #fff;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            border: none !important;
        }
        .img-preview-overlay .close-preview:hover {

            .nav-links { width: 100%; justify-content: center; }
            .header-right { width: 100%; justify-content: flex-start; }
            .contact-section h2 { font-size: 24px; }
            .price { font-size: 14px; }
            .buy-btn { font-size: 13px; padding: 10px 20px; }

// ============================================================
//  TARJIMALAR
// ============================================================
const translations = {
    uz: {
        services: "Xizmatlar",
        contact: "Bog'lanish",
        contactTitle: "📬 Biz bilan bog'lanish",
        contactDesc: "Quyidagi ijtimoiy tarmoqlar orqali bizga yozing — 24 soat ichida javob beramiz.",
        buyBtn: "Buyurtma berish",
        toastOrder: "✅ \"{name}\" — buyurtma qabul qilindi!",
        langLabel: "O'zbekcha"
    },
    en: {
        services: "Services",
        contact: "Contact",
        contactTitle: "📬 Contact Us",
        contactDesc: "Reach us via social media — we reply within 24 hours.",
        buyBtn: "Order Now",
        toastOrder: "✅ \"{name}\" — order received!",
        langLabel: "English"
    },
    ru: {
        services: "Услуги",
        contact: "Контакты",
        contactTitle: "📬 Свяжитесь с нами",
        contactDesc: "Напишите нам в соцсетях — мы отвечаем в течение 24 часов.",
        buyBtn: "Заказать",
        toastOrder: "✅ \"{name}\" — заказ принят!",
        langLabel: "Русский"
    }
};

let currentLang = 'uz';

// ============================================================
//  DOM elementlari
// ============================================================
const grid = document.getElementById('catalogGrid');
const contactSection = document.getElementById('contactSection');
const navLinks = document.querySelectorAll('.nav-link');
const contactTitle = document.getElementById('contactTitle');
const contactDesc = document.getElementById('contactDesc');
const langBtn = document.getElementById('langBtn');
const langMenu = document.getElementById('langMenu');
const langArrow = document.getElementById('langArrow');
const currentLangText = document.getElementById('currentLangText');
const langItems = document.querySelectorAll('.lang-menu-item');

const previewOverlay = document.getElementById('imgPreviewOverlay');
const previewImage = document.getElementById('previewImage');
const closePreviewBtn = document.getElementById('closePreviewBtn');

// ============================================================
//  TIL TANLASH DROPDOWN
// ============================================================
langBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    langMenu.classList.toggle('active');
    langArrow.classList.toggle('open');
});

document.addEventListener('click', function() {
    langMenu.classList.remove('active');
    langArrow.classList.remove('open');
});

langItems.forEach(item => {
    item.addEventListener('click', function() {
        const lang = this.dataset.lang;
        setLanguage(lang);
        langMenu.classList.remove('active');
        langArrow.classList.remove('open');
        langItems.forEach(i => i.classList.remove('active-lang'));
        this.classList.add('active-lang');
        currentLangText.innerHTML = this.innerHTML;
    });
});

// ============================================================
//  TILNI O'ZGARTIRISH FUNKSIYASI
// ============================================================
function setLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];

    document.querySelector('.nav-link[data-section="services"]').textContent = t.services;
    document.querySelector('.nav-link[data-section="contact"]').textContent = t.contact;

    contactTitle.textContent = t.contactTitle;
    contactDesc.textContent = t.contactDesc;

    document.querySelectorAll('.buy-btn').forEach(btn => {
        btn.textContent = t.buyBtn;
    });

    window._lang = lang;
}

// ============================================================
//  RENDER
// ============================================================
function renderCatalog() {
    const t = translations[currentLang];
    grid.innerHTML = products.map(p => `
        <div class="card-item" data-id="${p.id}">
            <div class="card-img" data-image="${p.image}">
                <img src="${p.image}" alt="${p.name}" loading="lazy" />
                ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ''}
            </div>
            <div class="card-info">
                <div class="card-title">${p.name}</div>
                <div class="card-desc">${p.desc}</div>
                <div class="card-footer">
                    <div class="price">$${p.price.toFixed(2)} ${p.oldPrice ? `<small>$${p.oldPrice.toFixed(2)}</small>` : ''}</div>
                    <button class="buy-btn" data-id="${p.id}">${t.buyBtn}</button>
                </div>
            </div>
        </div>
    `).join('');

    document.querySelectorAll('.card-img').forEach(imgContainer => {
        imgContainer.addEventListener('click', function(e) {
            e.stopPropagation();
            const imgSrc = this.dataset.image || this.querySelector('img')?.src;
            if (imgSrc) {
                openImagePreview(imgSrc);
            }
        });
    });

    document.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const product = products.find(p => p.id === id);
            if (product) {
                const t = translations[currentLang];
                showToast(t.toastOrder.replace('{name}', product.name));
                switchToContact();
            }
        });
    });
}

// ============================================================
//  IMAGE PREVIEW (FULLSCREEN)
// ============================================================
function openImagePreview(src) {
    previewImage.src = src;
    previewOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeImagePreview() {
    previewOverlay.classList.remove('active');
    document.body.style.overflow = '';
    previewImage.src = '';
}

previewOverlay.addEventListener('click', function(e) {
    if (e.target === this || e.target === closePreviewBtn) {
        closeImagePreview();
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && previewOverlay.classList.contains('active')) {
        closeImagePreview();
    }
});

// ============================================================
//  BO'LIMLARNI ALMASHTIRISH
// ============================================================
function switchToServices() {
    grid.classList.remove('hidden');
    contactSection.classList.remove('active');
    navLinks.forEach(b => b.classList.remove('active'));
    document.querySelector('.nav-link[data-section="services"]').classList.add('active');
}

function switchToContact() {
    grid.classList.add('hidden');
    contactSection.classList.add('active');
    navLinks.forEach(b => b.classList.remove('active'));
    document.querySelector('.nav-link[data-section="contact"]').classList.add('active');
}

// ============================================================
//  NAV LINK EVENTLARI
// ============================================================
navLinks.forEach(btn => {
    btn.addEventListener('click', function() {
        const section = this.dataset.section;
        if (section === 'services') {
            switchToServices();
        } else if (section === 'contact') {
            switchToContact();
        }
    });
});

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
//  INIT
// ============================================================
renderCatalog();
setLanguage('uz');
    </script>
